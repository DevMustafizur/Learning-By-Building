    <!DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="style.css">

        <!-- font awesome cdn link  -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous" referrerpolicy="no-referrer" />

        <!-- font popins cdn link -->
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet">

    </head>

    <body>
        <!-- header section start -->
        <header id="header">
            <div class="container">
                <div class="row">
                    <div class="web_logo">
                        <h3>Shop <span>Easy</span></h3>
                    </div>
                    <ul class="menu_list">
                        <i class="fa-solid fa-x toggleCloseBtn"></i>
                        <li><a href="./home.html">Home</a></li>
                        <li><a href="./shop.html">Shop</a></li>
                        <li><a href="./contact">Contact</a></li>
                    </ul>
                    <div class="nav_items">
                        <span class="cart_length">0</span>
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <i class="fa-brands fa-opencart"></i>
                        <i class="fa-solid fa-user-tie"></i>
                        <i class="fa-solid fa-bars toggleOpenBtn"></i>
                    </div>
                </div>
            </div>
        </header>
        <!-- header section end -->
        <main>
            <section id="shop_page_banner">
                <div class="container">
                    <div class="content">
                        <h3 class="shop_page_banner_title">Shop Page</h3>
                        <p class="shop_page_banner_description">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Quasi ad dolorem earum, <br> minus illum doloremque accusamus </p>
                    </div>
                </div>
            </section>
            <section id="shop">
                <div class="container">
                    <div class="row">
                        <aside class="filters show">
                            <i class="fa-solid fa-x toggleCloseBtn"></i>

                            <p class="filter_heading">SELECT FILTERS</p>
                            <div class="condition_forms">
                                <form action="">
                                    <p class="form_title">Condition</p>
                                    <div class="items">
                                        <div class="item">
                                            <div class="left_side">
                                                <input type="checkbox" name="" id="">
                                                <label for="">New</label>
                                            </div>
                                            <div class="right_side">
                                                <span>13</span>
                                            </div>
                                        </div>
                                        <div class="item">
                                            <div class="left_side">
                                                <input type="checkbox" name="" id="">
                                                <label for="">Sole</label>
                                            </div>
                                            <div class="right_side">
                                                <span>13</span>
                                            </div>
                                        </div>
                                    </div>
                                </form>
                                <form action="">
                                    <p class="form_title">Size</p>
                                    <div class="items">
                                        <div class="item">
                                            <div class="left_side">
                                                <input type="checkbox" name="" id="">
                                                <label for="">S</label>
                                            </div>
                                            <div class="right_side">
                                                <span>13</span>
                                            </div>
                                        </div>
                                        <div class="item">
                                            <div class="left_side">
                                                <input type="checkbox" name="" id="">
                                                <label for="">L</label>
                                            </div>
                                            <div class="right_side">
                                                <span>13</span>
                                            </div>
                                        </div>
                                        <div class="item">
                                            <div class="left_side">
                                                <input type="checkbox" name="" id="">
                                                <label for="">M</label>
                                            </div>
                                            <div class="right_side">
                                                <span>13</span>
                                            </div>
                                        </div>
                                    </div>
                                </form>
                                <form action="">
                                    <p class="form_title">Compositions</p>
                                    <div class="items">
                                        <div class="item">
                                            <div class="left_side">
                                                <input type="checkbox" name="" id="">
                                                <label for="">Men</label>
                                            </div>
                                            <div class="right_side">
                                                <span>13</span>
                                            </div>
                                        </div>
                                        <div class="item">
                                            <div class="left_side">
                                                <input type="checkbox" name="" id="">
                                                <label for="">Women</label>
                                            </div>
                                            <div class="right_side">
                                                <span>13</span>
                                            </div>
                                        </div>
                                        <div class="item">
                                            <div class="left_side">
                                                <input type="checkbox" name="" id="">
                                                <label for="">Kids</label>
                                            </div>
                                            <div class="right_side">
                                                <span>13</span>
                                            </div>
                                        </div>
                                        <div class="item">
                                            <div class="left_side">
                                                <input type="checkbox" name="" id="">
                                                <label for="">Others</label>
                                            </div>
                                            <div class="right_side">
                                                <span>13</span>
                                            </div>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </aside>
                        <div class="products_area">
                            <h2 class="products_subtitle"></h2>
                            <div class="products_list">
                                <div class="product"></div>
                                <div class="product"></div>
                                <div class="product"></div>
                                <div class="product"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
        <script src="./script.js"></script>
    </body>

    </html>
</body>

</html>
