<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- css file link start-->
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/pages/home.css">
    <!-- css file link end-->

    <!-- font awesome cdn link  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font popins cdn link -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- header section start -->
    <header id="header">
        <div class="container">
            <div class="row">
                <div class="web_logo">
                    <h3 class="brand_name">Shop<span>Easy</span></h3>
                </div>
                <ul class="menu_list">
                    <i class="fa-solid fa-x menu_close_btn"></i>
                    <li><a href="../pages/home.html">Home</a></li>
                    <li><a href="../pages/shop.html">Shop</a></li>
                    <li><a href="">Contact</a></li>
                </ul>
                <div class="nav_items">
                    <span class="cart_length">0</span>
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <i class="fa-brands fa-opencart"></i>
                    <i class="fa-solid fa-user-tie"></i>
                    <i class="fa-solid fa-bars menu_open_btn"></i>
                </div>
            </div>
        </div>
    </header>
    <!-- header section end -->

    <main id="main">
        <section id="banner">
            <div class="banner__container">
                <div class="banner__wrapper">

                    <div class="banner__content">
                        <p class="banner__subtitle">
                            Up to 20% discount on
                        </p>

                        <h1 class="banner__title">
                            Girl's Fashion
                        </h1>

                        <p class="banner__description">
                            We offer trendy, elegant, and comfortable fashion collections
                            designed for modern girls who love style and confidence.
                        </p>
                        <a href="./shop.html"> <button class="banner__button">
                                Explore Now
                            </button></a>
                    </div>

                    <div class="banner__image-wrapper">
                        <img class="banner__image" src="../assets/banner.png" alt="Girl Fashion Banner">
                    </div>
                </div>
            </div>
        </section>

        <section id="collections">
            <div class="container">
                <div class="collections__grid">
                    <div class="collections__card">
                        <img class="collections__image" src="../assets/category1.jpeg" alt="">
                        <h4 class="collections__title">Velvet Vogue</h4>
                    </div>

                    <div class="collections__card">
                        <img class="collections__image" src="../assets/category2.jpeg" alt="">
                        <h4 class="collections__title">Opal Muse</h4>
                    </div>

                    <div class="collections__card">
                        <img class="collections__image" src="../assets/category3.jpeg" alt="">
                        <h4 class="collections__title">Éclat Femme</h4>
                    </div>

                    <div class="collections__card">
                        <img class="collections__image" src="../assets/category4.jpeg" alt="">
                        <h4 class="collections__title">Maison Elle</h4>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script type="module" src="../js/script.js"></script>
</body>

</html>
