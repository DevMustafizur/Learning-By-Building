<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Service</title>
    <link rel="stylesheet" href="style.css">

    <!-- font popins cdn link -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <!-- font awesome cdn link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>
    <!-- working notice section start -->
    <section id="working_notice">
      <span>⚠️ কাজ প্রক্রিয়াধীন, খুব দ্রুতই সম্পন্ন হবে</span>
    </section>
    <!-- working notice section end -->

    <!-- header section start -->
    <header id="header">
        <div class="container">
            <div class="row">
                <div class="web__logo">
                    <img src="./assets/logo.png" alt="">
                    <h4 class="web__logo__titlle">Emergency <br> Service</h4>
                </div>
                <nav>
                    <div class="heart">
                        <span>0</span>
                        <img src="./assets/heart.png" alt="">
                    </div>
                    <div class="points">
                        <span>0</span>
                        <img src="./assets/coin.png" alt="">
                    </div>
                    <div class="copy">
                        <span>0</span>
                        <p>Copy</p>
                    </div>
                </nav>
            </div>
        </div>
    </header>
    <!-- header section end -->
    <!-- main start -->
    <main id="main">
        <!-- banner section start -->
        <section id="banner">
            <div class="container">
                <div class="banner__content">
                    <div class="image">
                        <img src="./assets/logo.png" alt="">
                    </div>
                    <div class="banner__slogan">
                        <h2 class="banner__title">জরুরি সেবা ডিরেক্টরি</h2>
                        <p class="banner__subtitile">Government Emergency Services at Your Fingertip - A Project by
                            Government of the People's Republic of Bangladesh</p>
                    </div>
                </div>
            </div>
        </section>
        <!-- banner section end -->

        <!-- help sectore section start -->
        <section id="help__sectore">
            <div class="call_history_toggle_btn">
                <i class="fa-solid fa-landmark"></i>
            </div>
            <div class="container">
                <div class="row">
                    <div class="sectore__area">

                    </div>
                    <div class="call__history__area">
                        <div class="heading">
                            <h2><img src="" alt=""> <span>Call History</span></h2>
                            <button>Clear</button>
                        </div>
                        <div class="history__list">
                            <div class="history__card">

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <!-- help sectore section end -->
    </main>
    <!-- main end -->
    <!-- footer section start -->
    <footer id="footer">

    </footer>
    <!-- footer section end -->

    <script src="./script.js"></script>
</body>

</html>
